  <meta property="og:title" content="Verificar Cobertura — Ligeira Telecom" />
  <meta property="og:description" content="Descubra se a fibra da Ligeira ja chegou na sua rua. Consulta rapida por CEP com mapa interativo." />

<!-- ===================== COBERTURA SPLIT ===================== -->
<section class="cov-section" id="cobertura" aria-label="Verificar cobertura de fibra optica">

  <!-- ---- FORM PANEL (Esquerda) ---- -->
  <div class="cov-form-panel" id="cov-step-form">
    <!-- Sidebar Header -->
    <div class="cov-sidebar-header">
      <a href="/" class="cov-logo-link" aria-label="Ligeira Telecom — Inicio">
        <img src="/src/images/LIGEIRA LOGO HORIZONTAL - FUNDO ROXO.png" alt="Logo Ligeira Telecom" style="height: 32px; width: auto;" />
      </a>
      <button class="hamburger" id="hamburger" aria-label="Abrir menu" aria-expanded="false" aria-controls="mobile-menu" style="display: flex;">
        <span></span><span></span><span></span>
      </button>
    </div>

    <div class="cov-form-inner">

      <div class="cov-badge" aria-hidden="true">
        <i data-lucide="map-pin"></i>
        Verificacao de Cobertura
      </div>

      <h1 class="cov-title">
        A Ligeira chegou<br>
        na <span class="cov-accent">sua rua?</span>
      </h1>
      <p class="cov-subtitle">
        Informe seu endereco abaixo para consultar a viabilidade
      </p>

      <form class="cov-form" id="cov-form" novalidate>

        <!-- CEP (primeiro campo — dispara o auto-fill) -->
        <div class="cov-field">
          <label class="cov-label" for="cov-cep">CEP</label>
          <input
            type="text"
            id="cov-cep"
            class="cov-input"
            placeholder="00000-000"
            maxlength="9"
            inputmode="numeric"
            autocomplete="postal-code"
            aria-describedby="cov-cep-status"
          />
          <div class="cov-cep-status" id="cov-cep-status" aria-live="polite"></div>
        </div>

        <!-- Numero + Bairro -->
        <div class="cov-field-row">
          <div class="cov-field" style="flex: 0 0 88px;">
            <label class="cov-label" for="cov-numero">Numero</label>
            <input
              type="text"
              id="cov-numero"
              class="cov-input"
              placeholder="No"
              inputmode="numeric"
              autocomplete="address-line2"
            />
          </div>
          <div class="cov-field" style="flex: 1;">
            <label class="cov-label" for="cov-bairro">Bairro</label>
            <input
              type="text"
              id="cov-bairro"
              class="cov-input cov-auto"
              placeholder="Bairro"
              aria-label="Bairro (preenchido automaticamente pelo CEP)"
              autocomplete="off"
            />
          </div>
        </div>

        <!-- Endereco (auto-fill) -->
        <div class="cov-field">
          <label class="cov-label" for="cov-endereco">Endereco</label>
          <input
            type="text"
            id="cov-endereco"
            class="cov-input cov-auto"
            placeholder="Preenchido automaticamente pelo CEP"
            aria-label="Endereco (preenchido automaticamente pelo CEP)"
            autocomplete="off"
          />
        </div>

        <!-- Cidade + Estado (auto-fill) -->
        <div class="cov-field-row">
          <div class="cov-field" style="flex: 1;">
            <label class="cov-label" for="cov-cidade">Cidade</label>
            <input
              type="text"
              id="cov-cidade"
              class="cov-input cov-auto"
              placeholder="Cidade"
              autocomplete="off"
            />
          </div>
          <div class="cov-field" style="flex: 0 0 68px;">
            <label class="cov-label" for="cov-estado">UF</label>
            <input
              type="text"
              id="cov-estado"
              class="cov-input cov-auto"
              placeholder="UF"
              maxlength="2"
              autocomplete="off"
            />
          </div>
        </div>

        <button type="submit" class="cov-btn-verify" id="cov-btn-verify">
          <i data-lucide="map-pin"></i>
          Verificar Viabilidade
        </button>

        <button type="button" class="cov-btn-location" id="cov-btn-location" aria-label="Usar minha localizacao atual">
          <i data-lucide="locate"></i>
          Usar minha localização
        </button>

      </form>

      <!-- Resultado da verificacao -->
      <div class="cov-result" id="cov-result" aria-live="polite"></div>

    </div>
  </div>

  <!-- ---- MAP PANEL (Direita / Mobile: tela cheia) ---- -->
  <div class="cov-map-panel" id="cov-step-map">

    <!-- Voltar (apenas mobile) -->
    <button class="cov-btn-back" id="cov-btn-back" aria-label="Voltar ao formulario">
      <i data-lucide="arrow-left"></i>
      Voltar
    </button>

    <!-- Mapa Leaflet -->
    <div id="cov-map" role="region" aria-label="Mapa de localizacao interativo"></div>

    <!-- Barra de confirmacao -->
    <div class="cov-confirm-bar" id="cov-confirm-bar">
      <div class="cov-confirm-note">
        <i data-lucide="info"></i>
        Verifique se o pin esta na sua rua antes de confirmar
      </div>
      <button class="cov-btn-confirm" id="cov-btn-confirm">
        <i data-lucide="check"></i>
        Confirmar Local
      </button>
    </div>

  </div>

</section>

</body>
</html>
